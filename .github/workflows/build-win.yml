name: Build Windows EXE

on:
  push:
    branches: [ "main" ]
  workflow_dispatch: {}

jobs:
  build-win:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        shell: pwsh
        run: |
          python -V
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Build exe (PyInstaller)
        shell: pwsh
        run: |
          pyinstaller --noconfirm --clean --name DakeClient --windowed `
            --collect-all PySide6 `
            --hidden-import uvicorn `
            --hidden-import uvicorn.logging `
            --hidden-import uvicorn.loops.auto `
            --hidden-import uvicorn.protocols.http.auto `
            --hidden-import uvicorn.protocols.websockets.auto `
            --hidden-import fastapi `
            --hidden-import starlette `
            --add-data "client_app/config/config.example.json;client_app/config" `
            client_app/app/main.py

      - name: Zip artifact
        shell: pwsh
        run: |
          Compress-Archive -Path dist/DakeClient/* -DestinationPath DakeClient-windows.zip -Force

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: DakeClient-windows
          path: DakeClient-windows.zip
