name: Build Windows EXE

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build-win:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install deps
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller pyside6
          # 如果你项目有 requirements.txt，就加这一行：
          # pip install -r requirements.txt

      - name: Sanity check paths
        shell: pwsh
        run: |
          ls
          ls client_app
          ls client_app/app
          python -c "import PySide6; print('PySide6 ok', PySide6.__version__)"

      - name: Build exe (no spec, safer)
        shell: pwsh
        run: |
          pyinstaller `
            --noconfirm `
            --clean `
            --name dake-client `
            --windowed `
            --collect-all PySide6 `
            client_app/app/main.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: dake-client-win
          path: dist/dake-client/**
