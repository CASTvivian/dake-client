name: Build Windows EXE

on:
  push:
    branches: [ "main" ]
  workflow_dispatch: {}

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-win:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Debug paths
        shell: pwsh
        run: |
          Get-Location
          dir
          dir packaging
          dir client_app
          dir client_app/app

      - name: Build
        shell: pwsh
        run: |
          pyinstaller -y packaging/pyinstaller.spec --log-level=DEBUG

      - name: Zip artifact
        shell: pwsh
        run: |
          Compress-Archive -Path dist/DakeClient/* -DestinationPath DakeClient-windows.zip -Force

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: DakeClient-windows
          path: DakeClient-windows.zip
