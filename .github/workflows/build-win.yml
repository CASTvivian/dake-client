name: Build Windows EXE

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build-win:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller pyside6

      - name: Build EXE
        run: |
          pyinstaller --clean --noconfirm packaging/pyinstaller.spec

      - name: Assemble runtime folder
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist_runtime | Out-Null
          Copy-Item -Recurse -Force dist\DakeClient\* dist_runtime\

          New-Item -ItemType Directory -Force -Path dist_runtime\data\xlsx_merge_6000 | Out-Null
          New-Item -ItemType Directory -Force -Path dist_runtime\data\nav_report_6002 | Out-Null

          New-Item -ItemType Directory -Force -Path dist_runtime\config | Out-Null
          if (Test-Path "client_app\config\config.example.json") {
            Copy-Item client_app\config\config.example.json dist_runtime\config\config.json -Force
          }

          "@
Dake Client (Windows)
- Run: DakeClient.exe
- Config: .\config\config.json
- Data:
  - 6000: .\data\xlsx_merge_6000
  - 6002: .\data\nav_report_6002
@" | Out-File -Encoding utf8 dist_runtime\README.txt

      - name: Zip artifact
        shell: pwsh
        run: |
          $ver = "${{ github.sha }}".Substring(0,7)
          $zip = "client-win-x64-$ver.zip"
          Compress-Archive -Path dist_runtime\* -DestinationPath $zip -Force
          echo "ZIP_NAME=$zip" >> $env:GITHUB_ENV

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ZIP_NAME }}
          path: ${{ env.ZIP_NAME }}
