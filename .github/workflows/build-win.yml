name: Build Windows EXE

on:
  push:
    branches: [ "main", "feat/win-dual-app-v2" ]
  workflow_dispatch: {}

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-win:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build 6002
        shell: pwsh
        run: |
          pyinstaller -y packaging/pyinstaller_6002.spec

      - name: Build 6000
        shell: pwsh
        run: |
          pyinstaller -y packaging/pyinstaller_6000.spec

      - name: Assemble 6002 runtime
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist_runtime_6002 | Out-Null
          Copy-Item -Recurse -Force dist\DakeClient6002\* dist_runtime_6002\
          New-Item -ItemType Directory -Force -Path dist_runtime_6002\data\6002 | Out-Null
          New-Item -ItemType Directory -Force -Path dist_runtime_6002\config | Out-Null
          Copy-Item client_app\config\config.example.json dist_runtime_6002\config\config.json -Force
          Copy-Item packaging\README-windows.txt dist_runtime_6002\README.txt -Force
          Compress-Archive -Path dist_runtime_6002\* -DestinationPath DakeClient6002-windows.zip -Force

      - name: Assemble 6000 runtime
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist_runtime_6000 | Out-Null
          Copy-Item -Recurse -Force dist\DakeClient6000\* dist_runtime_6000\
          New-Item -ItemType Directory -Force -Path dist_runtime_6000\data\6000 | Out-Null
          New-Item -ItemType Directory -Force -Path dist_runtime_6000\config | Out-Null
          Copy-Item client_app\config\config.example.json dist_runtime_6000\config\config.json -Force
          Copy-Item packaging\README-windows.txt dist_runtime_6000\README.txt -Force
          Compress-Archive -Path dist_runtime_6000\* -DestinationPath DakeClient6000-windows.zip -Force

      - name: Generate SHA256
        shell: pwsh
        run: |
          $hash6002 = (Get-FileHash DakeClient6002-windows.zip -Algorithm SHA256).Hash
          $hash6000 = (Get-FileHash DakeClient6000-windows.zip -Algorithm SHA256).Hash
          "DakeClient6002-windows.zip  $hash6002" | Out-File -Encoding utf8 SHA256.txt
          "DakeClient6000-windows.zip  $hash6000" | Out-File -Encoding utf8 -Append SHA256.txt

      - name: Upload 6002 artifact
        uses: actions/upload-artifact@v4
        with:
          name: DakeClient6002-windows
          path: DakeClient6002-windows.zip

      - name: Upload 6000 artifact
        uses: actions/upload-artifact@v4
        with:
          name: DakeClient6000-windows
          path: DakeClient6000-windows.zip

      - name: Upload SHA256
        uses: actions/upload-artifact@v4
        with:
          name: DakeClient-sha256
          path: SHA256.txt
